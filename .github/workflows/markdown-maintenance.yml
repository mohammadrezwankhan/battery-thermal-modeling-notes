name: Model and Markdown validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "**.md"
      - "**.py"
      - "models/**/*.csv"
      - ".github/workflows/markdown-maintenance.yml"
  push:
    branches:
      - main
    paths:
      - "**.md"
      - "**.py"
      - "models/**/*.csv"
      - ".github/workflows/markdown-maintenance.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Test executable models
        run: python -m unittest discover -s tests -v

      - name: Run reversible heat example
        run: >-
          python models/lumped_cell_thermal.py
          --profile-csv models/data/reversible_heat_current_profile.csv
          --integration-method exact-linear
          --output-csv "$RUNNER_TEMP/reversible-heat-intervals.csv"

      - name: Run variable cooling example
        run: >-
          python models/lumped_cell_thermal.py
          --profile-csv models/data/variable_cooling_profile.csv
          --integration-method exact-linear
          --output-csv "$RUNNER_TEMP/variable-cooling-intervals.csv"

      - name: Run external heat-source example
        run: >-
          python models/lumped_cell_thermal.py
          --profile-csv models/data/external_heat_profile.csv
          --integration-method exact-linear
          --output-csv "$RUNNER_TEMP/external-heat-intervals.csv"

      - name: Run radiative surroundings example
        run: >-
          python models/lumped_cell_thermal.py
          --profile-csv models/data/radiative_cooling_profile.csv
          --emissivity 0.85
          --radiating-area-m2 0.03
          --integration-method rk4
          --rk4-max-step-s 0.5
          --output-csv "$RUNNER_TEMP/radiative-surroundings-intervals.csv"

      - name: Check Markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress README.md CONTRIBUTING.md models/*.md notes/*.md templates/*.md references/*.md
          fail: true
